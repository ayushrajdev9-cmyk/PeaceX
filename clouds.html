<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky — PeaceVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-light: #f8fafc; --bg-white: #ffffff; --bg-gray: #f1f5f9; --text-dark: #0f172a; --text-gray: #475569; --text-light: #64748b; --blue-500: #0ea5e9; --blue-600: #0284c7; --blue-700: #0369a1; --blue-800: #075985; --border: #e2e8f0; --shadow: rgba(15, 23, 42, 0.08); }
        html { scroll-behavior: smooth; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-light); color: var(--text-dark); min-height: 100vh; overflow-x: hidden; }
        .bg-canvas { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .bg-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; }
        .bg-orb-1 { width: 500px; height: 500px; background: #bae6fd; top: -150px; right: -100px; }
        .bg-orb-2 { width: 400px; height: 400px; background: #e0f2fe; bottom: -100px; left: -50px; }
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 16px 48px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        nav.scrolled { padding: 12px 48px; box-shadow: 0 4px 20px var(--shadow); }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; color: var(--blue-800); text-decoration: none; }
        .nav-links { display: flex; gap: 4px; }
        .nav-links a { color: var(--text-gray); text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 10px 18px; border-radius: 24px; transition: all 0.25s ease; }
        .nav-links a:hover { color: var(--blue-700); background: var(--bg-gray); }
        .menu-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; }
        .menu-toggle span { width: 22px; height: 2px; background: var(--blue-800); border-radius: 2px; }
        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 140px 24px 80px; position: relative; z-index: 2; }
        .hero-badge { display: inline-flex; align-items: center; gap: 10px; background: var(--bg-white); padding: 10px 20px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; color: var(--blue-600); margin-bottom: 32px; box-shadow: 0 2px 12px var(--shadow); }
        .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 8vw, 5rem); font-weight: 400; color: var(--text-dark); letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 16px; }
        .hero p { font-size: 1.15rem; color: var(--text-gray); max-width: 440px; margin-bottom: 40px; }
        .section { padding: 100px 24px; position: relative; z-index: 2; }
        .container { max-width: 1100px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px var(--shadow); transition: all 0.4s ease; cursor: pointer; max-width: 600px; margin: 0 auto; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 16px 40px var(--shadow); }
        .card-image { position: relative; overflow: hidden; aspect-ratio: 16/10; }
        .card-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .card:hover .card-image img { transform: scale(1.08); }
        .card-content { padding: 20px; text-align: center; }
        .card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--text-dark); margin-bottom: 6px; }
        .card p { font-size: 0.9rem; color: var(--text-gray); }
        footer { background: white; padding: 40px 24px; text-align: center; position: relative; z-index: 2; border-top: 1px solid var(--border); }
        footer p { color: var(--text-light); font-size: 0.85rem; }
        @media (max-width: 640px) { nav { padding: 12px 20px; } .nav-links { position: fixed; top: 0; right: -100%; width: 260px; height: 100vh; flex-direction: column; background: white; padding: 90px 20px; transition: right 0.3s ease; box-shadow: -4px 0 24px var(--shadow); } .nav-links.active { right: 0; } .menu-toggle { display: flex; } .hero h1 { font-size: 2.4rem; } }
    </style>
</head>
<body>
    <div class="bg-canvas"><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div></div>
    <nav>
        <a href="index.html" class="logo">PeaceVerse</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="definition.html">Definition</a></li>
            <li><a href="spread-peace.html">Spread Peace</a></li>
            <li><a href="unity.html">Unity</a></li>
            <li><a href="harmony.html">Harmony</a></li>
            <li><a href="quiz.html">Quiz</a></li>
            <li><a href="sky.html" class="active">Sky</a></li>
        </ul>
        <button class="menu-toggle"><span></span><span></span><span></span></button>
    </nav>
    <section class="hero">
        <div class="hero-badge">Endless Horizon</div>
        <h1>The Sky</h1>
        <p>An open canvas stretching infinitely in all directions</p>
    </section>
    <section class="section">
        <div class="container">
            <div class="card">
                <div class="card-image"><img src="https://images.unsplash.com/photo-1454496522488-7a8e488e8606?w=600&q=80" alt="Sky"></div>
                <div class="card-content"><h3>Vast Expanse</h3><p>The endless blue invites quiet contemplation</p></div>
            </div>
        </div>
    </section>
    <footer><p>PeaceVerse &copy; 2026</p></footer>
    <script>
        window.addEventListener('scroll', () => { document.querySelector('nav').classList.toggle('scrolled', window.scrollY > 40); });
        document.querySelector('.menu-toggle').addEventListener('click', () => { document.querySelector('.nav-links').classList.toggle('active'); });
    </script>
</body>
</html>
